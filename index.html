<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP Приглашение</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        body { margin: 0; font-family: 'Segoe UI', Arial, sans-serif; height: 100vh; display: flex; justify-content: center; align-items: center; color: white; text-align: center; overflow: hidden; background: #1a1a1a; }
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('1.jpg') center/cover no-repeat; filter: blur(20px) brightness(0.4); z-index: -1; }
        .card { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); padding: 30px 20px; border-radius: 25px; max-width: 350px; width: 85%; box-shadow: 0 15px 50px rgba(0,0,0,0.8); border: 1px solid rgba(255,255,255,0.15); position: relative; z-index: 2; }
        h1 { font-size: 24px; margin: 0 0 10px 0; letter-spacing: 1px; }
        #guest { font-size: 20px; margin-bottom: 20px; color: #ffd700; font-weight: bold; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .highlight { font-weight: bold; display: block; margin: 12px 0; font-size: 16px; color: #ffebf3; }
        .invite-photo { width: 100%; max-width: 250px; height: 320px; object-fit: cover; border-radius: 20px; margin: 0 auto 20px; display: block; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 2px solid rgba(255,255,255,0.3); filter: blur(15px); transition: opacity 0.8s ease, filter 1.2s ease; }
        .bottom-info { background: rgba(0, 0, 0, 0.5); padding: 15px; border-radius: 15px; font-size: 13px; line-height: 1.6; text-align: left; border: 1px solid rgba(255,255,255,0.1); }
        .bottom-info a { color: #00ff88; text-decoration: none; font-weight: bold; }
        .btn-container { height: 70px; margin-top: 20px; display: flex; justify-content: center; align-items: center; gap: 15px; }
        button { font-size: 16px; padding: 12px 25px; border: none; border-radius: 15px; cursor: pointer; font-weight: bold; transition: transform 0.2s; }
        #yes { background: linear-gradient(135deg, #00c853, #b2ff59); color: #003300; box-shadow: 0 4px 15px rgba(0,200,83,0.4); }
        #no { background: #ff1744; color: white; transition: 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28); }
        #message { display: none; margin-top: 20px; font-size: 18px; font-weight: bold; color: #00ff88; text-shadow: 0 0 10px rgba(0,255,136,0.5); }
    </style>
</head>
<body>

<div class="card">
    <h1>🎂 VIP Приглашение</h1>
    <p id="guest">Загрузка...</p>
    <div>
        Дорогой друг! 📩<br>
        <span class="highlight">Приглашаю тебя на день рождения моей любимой Кули 🎂✨</span>
    </div>

    <img src="1.jpg" class="invite-photo" id="mainPhoto">

    <div class="bottom-info">
        👗 Дресс-код: розово-белые тона<br>
        📍 <a href="https://2gis.kz/aktobe/geo/70030076394441340" target="_blank">Адрес: СК Строитель 4, 54А 🔗</a><br>
        📅 30 апреля | ⏰ 17:00
    </div>

    <div class="btn-container">
        <button id="yes" onclick="startParty()">Я приду 😍</button>
        <button id="no">Не приду 😢</button>
    </div>
    <div id="message">✨ ТЫ В СПИСКЕ ГОСТЕЙ ✨</div>
</div>

<audio id="bgMusic" loop preload="auto">
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-17.mp3" type="audio/mpeg">
</audio>

<script>
    const params = new URLSearchParams(window.location.search);
    document.getElementById('guest').textContent = `Привет, ${params.get('name') || 'Друг'}!`;

    const yesBtn = document.getElementById('yes');
    const noBtn = document.getElementById('no');
    const bgMusic = document.getElementById('bgMusic');
    const mainPhoto = document.getElementById('mainPhoto');

    // Названия твоих фото (у тебя их 4 на гитхабе)
    const photos = ["1.jpg", "2.jpg", "3.jpg", "4.jpg"]; 
    let currentIndex = 0;

    // Слайдер фото
    setInterval(() => {
        mainPhoto.style.opacity = 0;
        setTimeout(() => {
            currentIndex = (currentIndex + 1) % photos.length;
            mainPhoto.src = photos[currentIndex];
            mainPhoto.style.opacity = 1;
        }, 800);
    }, 3500);

    // Кнопка "Нет" убегает
    function moveBtn() {
        noBtn.style.position = 'fixed';
        const maxX = window.innerWidth - noBtn.offsetWidth - 30;
        const maxY = window.innerHeight - noBtn.offsetHeight - 30;
        noBtn.style.left = Math.random() * maxX + 'px';
        noBtn.style.top = Math.random() * maxY + 'px';
    }
    noBtn.addEventListener('mouseover', moveBtn);
    noBtn.addEventListener('touchstart', (e) => { e.preventDefault(); moveBtn(); });

    // Главная функция при согласии
    function startParty() {
        bgMusic.volume = 0.5;
        bgMusic.play();

        mainPhoto.style.filter = "blur(0px)";
        document.getElementById('message').style.display = 'block';
        yesBtn.style.display = 'none';
        noBtn.style.display = 'none';

        // Взрыв конфетти
        const duration = 3 * 1000;
        const end = Date.now() + duration;

        (function frame() {
            confetti({
                particleCount: 5,
                angle: 60,
                spread: 55,
                origin: { x: 0 },
                colors: ['#ff69b4', '#ffffff']
            });
            confetti({
                particleCount: 5,
                angle: 120,
                spread: 55,
                origin: { x: 1 },
                colors: ['#ff69b4', '#ffffff']
            });

            if (Date.now() < end) {
                requestAnimationFrame(frame);
            }
        }());
    }
</script>
</body>
</html>
