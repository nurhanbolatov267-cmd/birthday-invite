<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIP Приглашение</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        body { margin: 0; font-family: 'Segoe UI', Arial, sans-serif; height: 100vh; display: flex; justify-content: center; align-items: center; color: white; text-align: center; overflow: hidden; background: #1a1a1a; }
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('1.jpg') center/cover no-repeat; filter: blur(20px) brightness(0.4); z-index: -1; }
        
        .card { 
            background: rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(25px); 
            -webkit-backdrop-filter: blur(25px); 
            padding: 10px; 
            border-radius: 20px; 
            max-width: 310px; 
            width: 85%; 
            max-height: 92vh; 
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: 0 15px 50px rgba(0,0,0,0.8); 
            border: 1px solid rgba(255,255,255,0.15); 
            position: relative; 
            z-index: 2; 
        }
        
        h1 { font-size: 18px; margin: 5px 0; }
        #guest { font-size: 18px; margin: 0 0 5px; color: #ffd700; font-weight: bold; }
        
        .highlight { 
            font-weight: bold; 
            display: block; 
            margin: 5px 0; 
            font-size: 15px; 
            color: #ffb6c1; 
            text-transform: uppercase;
            text-shadow: 0 0 8px #ff69b4; 
        }

        .invite-photo { 
            width: 100%; 
            height: 170px; 
            object-fit: cover; 
            border-radius: 15px; 
            margin: 5px auto; 
            display: block; 
            filter: blur(15px); 
            transition: opacity 0.8s ease, filter 1.2s ease; 
        }

        .bottom-info { background: rgba(0, 0, 0, 0.5); padding: 8px; border-radius: 12px; font-size: 11px; line-height: 1.4; text-align: left; }
        .bottom-info a { color: #00ff88; text-decoration: none; font-weight: bold; }

        .btn-container { min-height: 50px; margin-top: 5px; display: flex; justify-content: center; align-items: center; gap: 10px; position: relative; }
        
        button { font-size: 14px; padding: 10px 18px; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; }
        #yes { background: linear-gradient(135deg, #00c853, #b2ff59); color: #003300; z-index: 10; }
        
        /* КНОПКА НЕ ПРИДУ: добавили плавность анимации */
        #no { 
            background: #ff1744; 
            color: white; 
            transition: all 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28); 
            z-index: 10;
        }
        
        #message { display: none; margin-top: 5px; font-size: 15px; font-weight: bold; color: #00ff88; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="card">
    <h1>🎂 VIP Приглашение</h1>
    <p id="guest">Загрузка...</p>
    <div class="invite-text" style="font-size: 12px;">
        Дорогой друг/подруга! 📩<br>
        <span class="highlight">Приглашаю тебя на день рождения моей любимой Кули 🎂✨</span>
    </div>

    <img src="1.jpg" class="invite-photo" id="mainPhoto">

    <div class="bottom-info">
        👗 Дресс-код: розово-белые тона<br>
        📍 <a href="https://2gis.kz/aktobe/geo/70030076394441340" target="_blank">Адрес: СК Строитель 4, 54А 🔗</a><br>
        📅 30 апреля | ⏰ 17:00
    </div>

    <div class="btn-container">
        <button id="yes" onclick="startParty()">Я приду 😍</button>
        <button id="no">Не приду 😢</button>
    </div>
    <div id="message">✨ ТЫ В СПИСКЕ ГОСТЕЙ ✨</div>
</div>

<audio id="bgMusic" loop preload="auto">
    <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
    const params = new URLSearchParams(window.location.search);
    document.getElementById('guest').textContent = `Привет, ${params.get('name') || 'Друг'}!`;

    const yesBtn = document.getElementById('yes');
    const noBtn = document.getElementById('no');
    const bgMusic = document.getElementById('bgMusic');
    const mainPhoto = document.getElementById('mainPhoto');

    const photos = ["1.jpg", "2.jpg", "3.jpg", "4.jpg", "5.jpg"]; 
    let currentIndex = 0;

    setInterval(() => {
        mainPhoto.style.opacity = 0;
        setTimeout(() => {
            currentIndex = (currentIndex + 1) % photos.length;
            mainPhoto.src = photos[currentIndex];
            mainPhoto.style.opacity = 1;
        }, 800);
    }, 3500);

    // УЛУЧШЕННАЯ ФУНКЦИЯ ПОБЕГА
    function moveBtn() {
        noBtn.style.position = 'fixed';
        
        // Вычисляем случайные координаты так, чтобы кнопка не улетала за края экрана
        const padding = 20;
        const maxX = window.innerWidth - noBtn.offsetWidth - padding;
        const maxY = window.innerHeight - noBtn.offsetHeight - padding;
        
        const randomX = Math.max(padding, Math.random() * maxX);
        const randomY = Math.max(padding, Math.random() * maxY);
        
        noBtn.style.left = randomX + 'px';
        noBtn.style.top = randomY + 'px';
    }

    // Слушаем и наведение мышки, и касание пальцем
    noBtn.addEventListener('mouseover', moveBtn);
    noBtn.addEventListener('touchstart', (e) => { 
        e.preventDefault(); // Чтобы страница не дергалась при нажатии
        moveBtn(); 
    });

    function startParty() {
        bgMusic.play().catch(e => console.log("Музыка ждет клика"));
        mainPhoto.style.filter = "blur(0px)";
        document.getElementById('message').style.display = 'block';
        yesBtn.style.display = 'none';
        noBtn.style.display = 'none';

        var end = Date.now() + (4 * 1000);
        (function frame() {
            confetti({ particleCount: 3, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#ff69b4', '#ffffff', '#ffd700'] });
            confetti({ particleCount: 3, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#ff69b4', '#ffffff', '#ffd700'] });
            if (Date.now() < end) { requestAnimationFrame(frame); }
        }());
    }
</script>
</body>
</html>
