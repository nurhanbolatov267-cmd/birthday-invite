<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIP Приглашение</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        body { margin: 0; font-family: 'Segoe UI', Arial, sans-serif; height: 100vh; display: flex; justify-content: center; align-items: center; color: white; text-align: center; overflow: hidden; background: #1a1a1a; }
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('1.jpg') center/cover no-repeat; filter: blur(20px) brightness(0.4); z-index: -1; }
        
        .card { 
            background: rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(25px); 
            -webkit-backdrop-filter: blur(25px); 
            padding: 15px; 
            border-radius: 20px; 
            max-width: 320px; 
            width: 90%; 
            max-height: 96vh; 
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: 0 15px 50px rgba(0,0,0,0.8); 
            border: 1px solid rgba(255,255,255,0.15); 
            position: relative; 
            z-index: 2; 
        }
        
        h1 { font-size: 20px; margin: 5px 0; letter-spacing: 1px; }
        #guest { font-size: 18px; margin: 5px 0 10px; color: #ffd700; font-weight: bold; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        
        /* ГЛАВНОЕ ИЗМЕНЕНИЕ: Мягкий, "немножко неоновый" стиль */
        .highlight { 
            font-weight: bold; 
            display: block; 
            margin: 8px 0; 
            font-size: 16px; 
            color: #ffb6c1; /* Светло-розовый цвет, более нежный */
            text-transform: uppercase;
            letter-spacing: 1px;
            /* Легкое, фиксированное свечение (без анимации) */
            text-shadow: 
                0 0 3px #fff,    /* Белое ядро */
                0 0 8px #ff69b4; /* Розовый мягкий туман */
        }

        .invite-photo { 
            width: 100%; 
            height: 210px; /* Адаптировано под мобилки */
            object-fit: cover; 
            border-radius: 15px; 
            margin: 5px auto; 
            display: block; 
            filter: blur(15px); 
            transition: opacity 0.8s ease, filter 1.2s ease; 
        }

        .bottom-info { background: rgba(0, 0, 0, 0.5); padding: 10px; border-radius: 12px; font-size: 12px; line-height: 1.4; text-align: left; }
        .bottom-info a { color: #00ff88; text-decoration: none; font-weight: bold; }

        .btn-container { min-height: 60px; margin-top: 10px; display: flex; justify-content: center; align-items: center; gap: 10px; }
        
        button { font-size: 14px; padding: 10px 20px; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; }
        #yes { background: linear-gradient(135deg, #00c853, #b2ff59); color: #003300; }
        #no { background: #ff1744; color: white; transition: 0.1s; }
        
        #message { display: none; margin-top: 10px; font-size: 16px; font-weight: bold; color: #00ff88; text-transform: uppercase; }

        @media (max-height: 650px) {
            .invite-photo { height: 160px; }
            h1 { font-size: 18px; }
        }
    </style>
</head>
<body>

<div class="card">
    <h1>🎂 VIP Приглашение</h1>
    <p id="guest">Загрузка...</p>
    <div class="invite-text">
        Дорогой друг! 📩<br>
        <span class="highlight">Приглашаю тебя на день рождения моей любимой Кули 🎂✨</span>
    </div>

    <img src="1.jpg" class="invite-photo" id="mainPhoto">

    <div class="bottom-info">
        👗 Дресс-код: розово-белые тона<br>
        📍 <a href="https://2gis.kz/aktobe/geo/70030076394441340" target="_blank">Адрес: СК Строитель 4, 54А 🔗</a><br>
        📅 30 апреля | ⏰ 17:00
    </div>

    <div class="btn-container">
        <button id="yes" onclick="startParty()">Я приду 😍</button>
        <button id="no">Не приду 😢</button>
    </div>
    <div id="message">✨ ТЫ В СПИСКЕ ГОСТЕЙ ✨</div>
</div>

<audio id="bgMusic" loop preload="auto">
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-17.mp3" type="audio/mpeg">
</audio>

<script>
    const params = new URLSearchParams(window.location.search);
    document.getElementById('guest').textContent = `Привет, ${params.get('name') || 'Друг'}!`;

    const yesBtn = document.getElementById('yes');
    const noBtn = document.getElementById('no');
    const bgMusic = document.getElementById('bgMusic');
    const mainPhoto = document.getElementById('mainPhoto');

    const photos = ["1.jpg", "2.jpg", "3.jpg", "4.jpg"]; 
    let currentIndex = 0;

    setInterval(() => {
        mainPhoto.style.opacity = 0;
        setTimeout(() => {
            currentIndex = (currentIndex + 1) % photos.length;
            mainPhoto.src = photos[currentIndex];
            mainPhoto.style.opacity = 1;
        }, 800);
    }, 3500);

    function moveBtn() {
        noBtn.style.position = 'fixed';
        const maxX = window.innerWidth - noBtn.offsetWidth - 20;
        const maxY = window.innerHeight - noBtn.offsetHeight - 20;
        noBtn.style.left = Math.random() * maxX + 'px';
        noBtn.style.top = Math.random() * maxY + 'px';
    }
    noBtn.addEventListener('mouseover', moveBtn);
    noBtn.addEventListener('touchstart', (e) => { e.preventDefault(); moveBtn(); });

    function startParty() {
        bgMusic.volume = 0.5;
        bgMusic.play().catch(e => console.log("Музыка не запустилась"));

        mainPhoto.style.filter = "blur(0px)";
        document.getElementById('message').style.display = 'block';
        yesBtn.style.display = 'none';
        noBtn.style.display = 'none';

        var end = Date.now() + (4 * 1000);
        var colors = ['#ff69b4', '#ffffff', '#ffd700'];

        (function frame() {
            confetti({ particleCount: 3, angle: 60, spread: 55, origin: { x: 0 }, colors: colors });
            confetti({ particleCount: 3, angle: 120, spread: 55, origin: { x: 1 }, colors: colors });
            if (Date.now() < end) { requestAnimationFrame(frame); }
        }());
    }
</script>
</body>
</html>
